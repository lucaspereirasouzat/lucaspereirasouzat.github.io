          - paragraph [ref=e48]: Especialista em JavaScript e ecossistema moderno
          - paragraph [ref=e49]: Sou Desenvolvedor Full-Stack, graduado em Análise de Sistemas, com ampla experiência em tecnologias modernas e um forte alinhamento com a filosofia de Código Aberto, tão valorizada pela comunidade tecnológica. Minha atuação está centrada na linguagem de programação JavaScript, com proficiência em frameworks e bibliotecas de destaque, como ReactJS, Next.js, React Native, AdonisJS e Express. Possuo conhecimentos em sistemas de mensageria distribuída com Kafka, automação de testes utilizando Jest, e orquestração de contêineres através de Kubernetes. Minha experiência se estende também ao uso de bancos de dados relacionais e não-relacionais, como Postgres, MongoDB e Redis, o que me permite lidar com diversas arquiteturas de armazenamento de dados. Além da prática técnica, sou um entusiasta de princípios de engenharia de software de alta qualidade, sendo familiar com as diretrizes apresentadas em obras consagradas como Clean Code, Domain-Driven Design (DDD) e Refatoração. Esses conhecimentos me capacitam a desenvolver soluções robustas, escaláveis e de fácil manutenção, sempre priorizando a clareza e a eficiência no código. Minha carreira é pautada por uma abordagem proativa e colaborativa, sempre em busca de excelência técnica e inovação.
